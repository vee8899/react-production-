name: Build container

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/YOUR_GITHUB_USER/automation-platform:latest
          build-args: |
            VITE_SUPABASE_URL=${{ vars.https://iutycpnqlzxovffctjyz.supabase.co }}
            VITE_SUPABASE_ANON_KEY=${{ vars.sb_publishable_VJaP1tog1UmGd19mcUdTOw_LSRzDlrG}}